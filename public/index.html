<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>webshell</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<style>
  :root {
    --bg: #0b0e14;
    --panel: #10141d;
    --border: #1f2633;
    --fg: #c7d0e0;
    --accent: #38e0c0;
    --muted: #5b6472;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    user-select: none;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  .title { margin-left: 6px; color: var(--muted); letter-spacing: 0.5px; }
  .status { margin-left: auto; color: var(--muted); }
  .status.on { color: var(--accent); }

  .tabs { display: none; gap: 4px; margin-left: 16px; }
  .tabs.show { display: flex; }
  .tab {
    padding: 4px 12px;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .tab.active { color: var(--accent); border-color: var(--border); background: var(--bg); }

  #terminal { flex: 1; padding: 8px; overflow: hidden; display: none; }
  #terminal.active { display: block; }
  #desktop { flex: 1; padding: 8px; overflow: hidden; display: none; }
  #desktop.active { display: flex; }
  #desktop canvas { margin: auto; }

  /* Login overlay */
  #login {
    position: fixed;
    inset: 0;
    background: rgba(6, 8, 12, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #login.hidden { display: none; }
  .card {
    width: min(360px, 90vw);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
  }
  .card h1 {
    margin: 0 0 4px;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .card p { margin: 0 0 18px; color: var(--muted); font-size: 13px; }
  .card input {
    width: 100%;
    padding: 11px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  .card input:focus { border-color: var(--accent); }
  .card button {
    width: 100%;
    margin-top: 12px;
    padding: 11px;
    background: var(--accent);
    color: #04110d;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .card button:active { transform: translateY(1px); }
  .err { color: #ff6b6b; font-size: 13px; min-height: 18px; margin-top: 10px; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="title">webshell</span>
    <div id="tabs" class="tabs">
      <span class="tab active" data-tab="terminal">Terminal</span>
      <span class="tab" data-tab="desktop">Desktop</span>
    </div>
    <span id="status" class="status">disconnected</span>
  </div>

  <div id="terminal" class="active"></div>
  <div id="desktop"></div>

  <div id="login">
    <div class="card">
      <h1>webshell</h1>
      <p>Enter the access password to open a shell.</p>
      <input id="pw" type="password" placeholder="password" autocomplete="current-password" />
      <button id="go">Connect</button>
      <div id="err" class="err"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script type="module">
    import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc@1.7.0/core/rfb.js';
    window.__RFB = RFB;
  </script>
  <script>
    const $ = (id) => document.getElementById(id);
    const loginEl = $('login');
    const statusEl = $('status');
    const tabsEl = $('tabs');
    let currentToken = null;
    let rfb = null;

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.tab === name));
      $('terminal').classList.toggle('active', name === 'terminal');
      $('desktop').classList.toggle('active', name === 'desktop');
      if (name === 'terminal') {
        fit.fit();
        term.focus();
      } else if (name === 'desktop') {
        connectDesktop();
      }
    }
    tabsEl.addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (tab) switchTab(tab.dataset.tab);
    });

    function connectDesktop() {
      if (rfb || !currentToken || !window.__RFB) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const url = `${proto}://${location.host}/vnc-ws?token=${encodeURIComponent(currentToken)}`;
      rfb = new window.__RFB($('desktop'), url);
      rfb.scaleViewport = true;
      rfb.addEventListener('disconnect', () => { rfb = null; });
    }

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
      fontSize: 14,
      scrollback: 5000,
      theme: {
        background: '#0b0e14',
        foreground: '#c7d0e0',
        cursor: '#38e0c0',
        selectionBackground: '#26304a',
      },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);

    let opened = false;
    function openTerminal() {
      if (opened) return;
      term.open($('terminal'));
      fit.fit();
      opened = true;
    }

    function setStatus(text, on) {
      statusEl.textContent = text;
      statusEl.classList.toggle('on', !!on);
    }

    function connect(token) {
      currentToken = token;
      loginEl.classList.add('hidden');
      openTerminal();
      term.focus();

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`);

      const sendResize = () => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
      };

      ws.onopen = () => {
        setStatus('connected', true);
        term.onData((d) => ws.send(JSON.stringify({ type: 'input', data: d })));
        sendResize();
      };
      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type === 'output') term.write(m.data);
      };
      ws.onclose = () => {
        setStatus('disconnected');
        term.write('\r\n\x1b[31m[connection closed]\x1b[0m\r\n');
      };
      ws.onerror = () => setStatus('error');

      window.addEventListener('resize', () => {
        fit.fit();
        sendResize();
      });
    }

    async function login(password) {
      $('err').textContent = '';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (!r.ok) {
          let msg = 'Invalid password';
          try {
            const body = await r.json();
            if (body && body.error) msg = body.error;
          } catch {}
          $('err').textContent = msg;
          return;
        }
        const { token } = await r.json();
        connect(token);
      } catch (e) {
        $('err').textContent = 'Could not reach server';
      }
    }

    async function boot() {
      let cfg = { authRequired: true };
      try {
        cfg = await fetch('/api/config').then((r) => r.json());
      } catch {}
      tabsEl.classList.toggle('show', !!cfg.desktopEnabled);
      if (!cfg.authRequired) {
        login(''); // localhost, no password
      } else {
        loginEl.classList.remove('hidden');
        $('pw').focus();
      }
    }

    $('go').addEventListener('click', () => login($('pw').value));
    $('pw').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login($('pw').value);
    });

    boot();
  </script>
</body>
</html>
